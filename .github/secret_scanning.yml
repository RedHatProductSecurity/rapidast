# GitHub Secret Scanning configuration
# https://docs.github.com/en/code-security/secret-scanning/defining-custom-patterns-for-secret-scanning

paths-ignore:
  # E2E test files with dummy authentication credentials
  - 'e2e-tests/manifests/rapidast-vapi-configmap-http-basic.yaml'
  - 'e2e-tests/manifests/rapidast-vapi-configmap-http-header.yaml'
  - 'e2e-tests/test_authentication.py'

# Custom patterns to ignore specific dummy test values
custom-patterns:
  - name: dummy-basic-auth-credentials
    regex: 'user:mypassw0rd'
    description: 'Dummy HTTP Basic auth credentials used in e2e tests'

  - name: dummy-auth-header-value
    regex: 'MySecretHeader'
    description: 'Dummy Authorization header value used in e2e tests'

  - name: dummy-basic-auth-base64
    regex: 'dXNlcjpteXBhc3N3MHJk'
    description: 'Base64 encoding of dummy HTTP Basic auth credentials (user:mypassw0rd)'
