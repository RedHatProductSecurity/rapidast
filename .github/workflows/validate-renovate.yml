name: "Validate renovate.json config"

on:
  push:
    branches: ["development", "main"]
    paths:
      - "renovate.json"
  pull_request:
    branches: ["development", "main"]
    paths:
      - "renovate.json"

jobs:
  renovate-config-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: konflux-ci/renovate-config-validator-action@main
